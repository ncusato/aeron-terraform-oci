---
- name: Create benchmark and scripts directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ aeron_dir }}/benchmark"
    - "{{ aeron_dir }}/scripts"
    - "{{ aeron_dir }}/scripts/config"

- name: Create benchmark runner script (in benchmark dir)
  template:
    src: run-benchmark.sh.j2
    dest: "{{ aeron_dir }}/benchmark/run-benchmark.sh"
    mode: '0755'

- name: Create benchmark runner script (in aeron root for backward compatibility)
  template:
    src: run-benchmark.sh.j2
    dest: "{{ aeron_dir }}/run-benchmark.sh"
    mode: '0755'

- name: Create results directory
  file:
    path: "{{ aeron_dir }}/results"
    state: directory
    mode: '0755'

- name: Create benchmark configuration (in benchmark dir)
  template:
    src: benchmark-config.yml.j2
    dest: "{{ aeron_dir }}/benchmark/benchmark-config.yml"
    mode: '0644'

- name: Create benchmark configuration (in aeron root)
  template:
    src: benchmark-config.yml.j2
    dest: "{{ aeron_dir }}/benchmark-config.yml"
    mode: '0644'

- name: Create scripts config for aeron-io/benchmarks wrappers
  template:
    src: benchmark-config.env.j2
    dest: "{{ aeron_dir }}/scripts/config/benchmark-config.env"
    mode: '0644'

- name: Create run-echo-benchmark launcher (sources config, runs wrapper)
  template:
    src: run-echo-benchmark.sh.j2
    dest: "{{ aeron_dir }}/scripts/run-echo-benchmark.sh"
    mode: '0755'

- name: Copy benchmark wrapper scripts to benchmarks-dist/scripts (controller only)
  copy:
    src: "wrappers/{{ item }}"
    dest: "{{ benchmarks_dist_path }}/scripts/{{ item }}"
    mode: '0755'
  loop:
    - wrapper-echo-unified.sh
    - wrapper-cluster-unified.sh
    - aggregate-compare-results.sh
    - run-driver-matrix.sh
  when: node_role | default('') == 'controller' and (benchmarks_dist_path | default('')) != ''

- name: Ensure benchmarks scripts config directory exists (controller only)
  file:
    path: "{{ benchmarks_dist_path }}/scripts/config"
    state: directory
    mode: '0755'
  when: node_role | default('') == 'controller' and (benchmarks_dist_path | default('')) != ''

- name: Copy benchmark config into benchmarks scripts directory (controller only)
  template:
    src: benchmark-config.env.j2
    dest: "{{ benchmarks_dist_path }}/scripts/config/benchmark-config.env"
    mode: '0644'
  when: node_role | default('') == 'controller' and (benchmarks_dist_path | default('')) != ''

- name: Create benchmark README
  copy:
    dest: "{{ aeron_dir }}/benchmark/README.md"
    content: |
      # Aeron benchmark scripts
      Run the latency benchmark: ./run-benchmark.sh
      Config: benchmark-config.yml
      Results go to: {{ aeron_dir }}/results/
    mode: '0644'

- name: Mark Aeron setup complete
  file:
    path: "{{ aeron_dir }}/.aeron-ready"
    state: touch
    mode: '0644'
