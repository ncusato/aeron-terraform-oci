---
# Build aeron-io/benchmarks on controller: clone, gradlew deployTar, extract to benchmarks-dist.
# Only runs when node_role is controller (set by Terraform extra vars).
- name: Ensure benchmarks build directory exists
  file:
    path: "{{ aeron_dir }}/benchmarks-src"
    state: directory
    mode: '0755'
  when: node_role | default('') == 'controller'

- name: Clone benchmarks repository
  git:
    repo: "{{ benchmarks_repo_url }}"
    dest: "{{ aeron_dir }}/benchmarks-src"
    version: "{{ benchmarks_git_branch | default('master', true) }}"
    force: yes
  register: benchmarks_clone
  when: node_role | default('') == 'controller'

- name: Check if benchmarks tar exists
  stat:
    path: "{{ aeron_dir }}/benchmarks-src/build/distributions/benchmarks.tar"
  register: benchmarks_tar_stat
  when: node_role | default('') == 'controller'

- name: Build benchmarks distribution (deployTar)
  shell: |
    set -e
    export JAVA_HOME=/usr/lib/jvm/java-{{ java_version }}-openjdk-amd64
    ./gradlew clean deployTar
  args:
    chdir: "{{ aeron_dir }}/benchmarks-src"
  environment:
    JAVA_HOME: "/usr/lib/jvm/java-{{ java_version }}-openjdk-amd64"
  when: node_role | default('') == 'controller' and (benchmarks_clone.changed | default(true) or force_rebuild | default(false) or not (benchmarks_tar_stat.stat.exists | default(false)))

- name: Re-check if benchmarks tar exists after build
  stat:
    path: "{{ aeron_dir }}/benchmarks-src/build/distributions/benchmarks.tar"
  register: benchmarks_tar_stat_after_build
  when: node_role | default('') == 'controller'

- name: Extract benchmarks tar to benchmarks-dist (Gradle creates single top-level dir)
  shell: |
    set -e
    TAR="{{ aeron_dir }}/benchmarks-src/build/distributions/benchmarks.tar"
    rm -rf "{{ benchmarks_dist_path }}-bak" "{{ benchmarks_dist_path }}"
    mkdir -p "{{ aeron_dir }}/_bench_extract"
    tar -xf "$TAR" -C "{{ aeron_dir }}/_bench_extract"
    TOP=$(ls -1 "{{ aeron_dir }}/_bench_extract" | head -1)
    mv "{{ aeron_dir }}/_bench_extract/$TOP" "{{ benchmarks_dist_path }}"
    rm -rf "{{ aeron_dir }}/_bench_extract"
  args:
    executable: /bin/bash
  when: node_role | default('') == 'controller' and benchmarks_tar_stat_after_build.stat.exists | default(false)

- name: Ensure benchmarks scripts staging directory exists
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ benchmarks_dist_path }}/scripts"
    - "{{ benchmarks_dist_path }}/scripts/aeron"
  when: node_role | default('') == 'controller'

- name: Find benchmark launcher executables in extracted distribution
  find:
    paths: "{{ benchmarks_dist_path }}"
    recurse: true
    file_type: file
    patterns:
      - "remote-echo-benchmarks"
      - "remote-cluster-benchmarks"
      - "aggregate-results"
  register: benchmarks_launcher_files
  when: node_role | default('') == 'controller'

- name: Resolve launcher executable paths
  set_fact:
    benchmarks_remote_echo_path: "{{ (benchmarks_launcher_files.files | map(attribute='path') | select('search', '/remote-echo-benchmarks$') | list | first) | default('') }}"
    benchmarks_remote_cluster_path: "{{ (benchmarks_launcher_files.files | map(attribute='path') | select('search', '/remote-cluster-benchmarks$') | list | first) | default('') }}"
    benchmarks_aggregate_results_path: "{{ (benchmarks_launcher_files.files | map(attribute='path') | select('search', '/aggregate-results$') | list | first) | default('') }}"
  when: node_role | default('') == 'controller'

- name: Debug resolved benchmark launcher paths
  debug:
    msg:
      - "benchmarks_dist_path={{ benchmarks_dist_path }}"
      - "matched_launcher_files={{ benchmarks_launcher_files.matched | default(0) }}"
      - "remote_echo={{ benchmarks_remote_echo_path }}"
      - "remote_cluster={{ benchmarks_remote_cluster_path }}"
      - "aggregate_results={{ benchmarks_aggregate_results_path }}"
  when: node_role | default('') == 'controller'

- name: Fail if required launcher executables are missing
  fail:
    msg: >-
      Required benchmark launcher(s) missing under {{ benchmarks_dist_path }}.
      remote-echo-benchmarks='{{ benchmarks_remote_echo_path }}'
      remote-cluster-benchmarks='{{ benchmarks_remote_cluster_path }}'
      aggregate-results='{{ benchmarks_aggregate_results_path }}'
  when:
    - node_role | default('') == 'controller'
    - benchmarks_remote_echo_path == '' or benchmarks_remote_cluster_path == '' or benchmarks_aggregate_results_path == ''

- name: Link launcher executables into stable scripts layout
  file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop:
    - src: "{{ benchmarks_remote_echo_path }}"
      dest: "{{ benchmarks_dist_path }}/scripts/aeron/remote-echo-benchmarks"
    - src: "{{ benchmarks_remote_cluster_path }}"
      dest: "{{ benchmarks_dist_path }}/scripts/aeron/remote-cluster-benchmarks"
    - src: "{{ benchmarks_aggregate_results_path }}"
      dest: "{{ benchmarks_dist_path }}/scripts/aggregate-results"
  when: node_role | default('') == 'controller'

# Deploy benchmarks-dist to benchmark nodes so they can run echo/server side.
# Requires benchmark_node_ips (comma-separated string, e.g. "10.0.1.2,10.0.1.3") and deploy_key on controller.
- name: Deploy benchmarks-dist to benchmark nodes
  shell: |
    set -e
    KEY="{{ aeron_dir }}/.ssh/deploy_key"
    for ip in $(echo "{{ benchmark_node_ips | default('') }}" | tr ',' ' '); do
      [ -z "$ip" ] && continue
      # Stream tar over SSH so benchmark nodes do not require rsync package.
      tar -C "{{ benchmarks_dist_path }}" -czf - . | ssh -i "$KEY" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "{{ ssh_username | default('ubuntu') }}@$ip" \
        "sudo rm -rf '{{ benchmarks_dist_path }}' && sudo mkdir -p '{{ benchmarks_dist_path }}' && sudo tar -xzf - -C '{{ benchmarks_dist_path }}' && sudo chown -R {{ ssh_username | default('ubuntu') }}:{{ ssh_username | default('ubuntu') }} '{{ benchmarks_dist_path }}'"
    done
  when:
    - node_role | default('') == 'controller'
    - benchmark_node_ips is defined
    - benchmark_node_ips | default('') | length > 0
  changed_when: true
